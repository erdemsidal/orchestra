# Grafana açılışta bu Prometheus datasource'unu otomatik ekler (elle eklemeye gerek yok).
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus               # dashboard panelleri bu uid ile bağlanır
    type: prometheus
    access: proxy
    url: http://prometheus:9090   # aynı docker ağındaki prometheus konteyneri
    isDefault: true
