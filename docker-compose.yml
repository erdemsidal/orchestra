services:
  # ═══════════════════════════════════════════
  # PostgreSQL 16
  # ═══════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: orchestra-postgres
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-orchestra_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-orchestra_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # Redis 7
  # ═══════════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: orchestra-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════
  # LocalStack — AWS'i lokalde taklit eder (biz sadece SQS kullanıyoruz)
  # ═══════════════════════════════════════════
  localstack:
    image: localstack/localstack:3
    container_name: orchestra-localstack
    restart: unless-stopped
    ports:
      - "4566:4566"          # LocalStack'in tek "edge" portu; tüm AWS servisleri buradan
    environment:
      SERVICES: sqs          # sadece SQS'i başlat (hızlı, hafif)
      DEBUG: "0"
    volumes:
      # Açılışta kuyruğu oluşturan init script'i buraya mount ediyoruz.
      - "./localstack/init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD-SHELL", "awslocal sqs list-queues || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ═══════════════════════════════════════════
  # Prometheus — metrikleri toplar (Faz 4)
  # ═══════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: orchestra-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  # ═══════════════════════════════════════════
  # Grafana — metrikleri görselleştirir (Faz 4)
  # ═══════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.2.0
    container_name: orchestra-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Kolay izleme için: giriş yapmadan (anonim) görüntüleme açık.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  # ═══════════════════════════════════════════
  # Spring Boot App (opsiyonel — local dev'de
  # genelde sadece postgres + redis çalıştırıp
  # uygulamayı IDE'den çalıştırırsın)
  # ═══════════════════════════════════════════
  # app:
  #   build: .
  #   container_name: orchestra-app
  #   restart: unless-stopped
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   env_file:
  #     - .env
  #   environment:
  #     SPRING_PROFILES_ACTIVE: dev
  #     DB_HOST: postgres
  #     REDIS_HOST: redis

volumes:
  grafana_data:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
