name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Şimdilik yalnızca birim testleri (Docker gerektirmeyen, hızlı olanlar).
      # Testcontainers'lı entegrasyon testleri "integration" etiketli ve burada
      # hariç tutuluyor — onları CI'da çalıştırmak sonraki bir iş (bkz. README).
      - name: Run unit tests
        run: ./mvnw -B test -DexcludedGroups=integration
