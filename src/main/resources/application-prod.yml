# ═══════════════════════════════════════════════════════════
# PROD Profile — Production ortamı
# ═══════════════════════════════════════════════════════════

spring:
  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    clean-disabled: true   # ASLA production'da clean yapma

logging:
  level:
    root: WARN
    com.orchestra: INFO

# Swagger kapalı — production'da API docs expose etme
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
