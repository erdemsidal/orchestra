# ═══════════════════════════════════════════════════════════
# Job Orchestrator — Ortak Konfigürasyon
# Profil-spesifik ayarlar application-{dev|prod}.yml'de
# ═══════════════════════════════════════════════════════════

spring:
  application:
    name: orchestra

  # ── Java 21 Virtual Threads ──────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── PostgreSQL + JPA ─────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:orchestra_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        default_schema: public
        jdbc:
          time_zone: UTC

  # ── Flyway ───────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
    baseline-on-migrate: false

  # ── Redis ────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

  cache:
    type: redis

  # ── Jackson ──────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null

# ═══════════════════════════════════════════════════════════
# Actuator — uygulamanın gösterge paneli
# ═══════════════════════════════════════════════════════════
management:
  endpoints:
    web:
      exposure:
        # Bu endpoint'ler dış dünyaya açılır. prometheus'u Faz 2'de metrik
        # toplamak için ekledik.
        include: health,info,metrics,caches,prometheus
  endpoint:
    health:
      show-details: always   # auth'u kaldırdığımız için dev'de detayları hep göster
  metrics:
    distribution:
      # http.server.requests metriğinin percentile'larını (p50/p95/p99)
      # sunucu tarafında hesaplat. "Önce ölç" için bu şart.
      percentiles-histogram:
        "[http.server.requests]": true
      percentiles:
        "[http.server.requests]": 0.5, 0.95, 0.99

# ═══════════════════════════════════════════════════════════
# Server
# ═══════════════════════════════════════════════════════════
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
